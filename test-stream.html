<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>测试流式输出</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    #output {
      border: 1px solid #ccc;
      padding: 15px;
      min-height: 200px;
      background: #f9f9f9;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    input {
      padding: 8px;
      width: 300px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>测试流式输出</h1>
  <div>
    <input type="text" id="sessionId" placeholder="Session ID (可选)" />
    <input type="text" id="message" placeholder="输入消息" value="你好，介绍一下自己" />
    <button onclick="testStream()">发送（流式）</button>
    <button onclick="clearOutput()">清空</button>
  </div>
  <h3>输出：</h3>
  <div id="output"></div>

  <script>
    async function testStream() {
      const sessionId = document.getElementById('sessionId').value || '96eadfbe-8db7-4573-ac5f-746aa66a067f';
      const message = document.getElementById('message').value;
      const output = document.getElementById('output');
      output.textContent = '正在连接...\n';

      try {
        const response = await fetch('http://localhost:3000/api/chat/messages/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, content: message })
        });

        if (!response.ok) {
          output.textContent += `错误: ${response.status} ${response.statusText}\n`;
          return;
        }

        if (!response.body) {
          output.textContent += '错误: 没有响应体\n';
          return;
        }

        output.textContent = '开始接收流式数据:\n\n';

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            output.textContent += '\n\n[流结束]';
            break;
          }

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';

          for (const part of parts) {
            if (part.startsWith('event: error')) {
              const dataLine = part.split('\n').find(line => line.startsWith('data: '));
              if (dataLine) {
                const payload = JSON.parse(dataLine.replace('data: ', ''));
                output.textContent += `\n[错误: ${payload.message}]`;
              }
            } else if (part.startsWith('event: done')) {
              const dataLine = part.split('\n').find(line => line.startsWith('data: '));
              if (dataLine) {
                const payload = JSON.parse(dataLine.replace('data: ', ''));
                output.textContent += `\n\n[完成] Sources: ${JSON.stringify(payload.sources)}`;
              }
            } else if (part.startsWith('data: ')) {
              const token = part.replace('data: ', '');
              output.textContent += token;
            }
          }
        }
      } catch (error) {
        output.textContent += `\n\n[异常: ${error.message}]`;
        console.error(error);
      }
    }

    function clearOutput() {
      document.getElementById('output').textContent = '';
    }
  </script>
</body>
</html>
