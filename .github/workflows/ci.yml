name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root deps
        run: pnpm install

      - name: Install backend deps
        run: pnpm -C backend install

      - name: Install frontend deps
        run: pnpm -C frontend install

      - name: Type check backend
        run: cd backend && pnpm tsc --noEmit

      - name: Type check frontend
        run: cd frontend && pnpm vue-tsc --noEmit

      - name: Lint backend
        run: pnpm -C backend lint

      - name: Lint frontend
        run: pnpm -C frontend lint

      - name: Test backend (workflow engine)
        run: pnpm -C backend test:workflow

      - name: Test frontend (vitest)
        run: cd frontend && pnpm vitest run

      - name: Build backend
        run: pnpm -C backend build

      - name: Build frontend
        run: pnpm -C frontend build:ci
